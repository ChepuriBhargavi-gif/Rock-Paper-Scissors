<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>


    <p class = "name">Rock Paper Scissors</p>


    <button class = "move-btn" onclick=" 

        playGame('rock');
    
        ">

        <img class="move-img" src="images/rock-emoji.png">

    </button>

    <button class = "move-btn" onclick="
    

        playGame('paper');


       "><img class="move-img" src="images/paper-emoji.png">



    </button>



    <button class = "move-btn" onclick=" 
    
         
        playGame('scissors');
        
        
        
        "> <img class="move-img" src="images/scissors-emoji.png">


    </button>

    <p class="js-result result"></p>
    <p class="js-moves moves"></p>
    <p class="js-score score"></p>


    <button class = "reset-score-btn"
    
    onclick="
    

        score.wins = 0;
        score.ties = 0;
        score.losses = 0;

        

        localStorage.removeItem('score');

        updateScore();
        
    ">Reset Score</button>



    <script src="script.js"></script>

</body>

</html>
